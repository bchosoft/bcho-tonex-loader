name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows/amd64
            artifact: BCho-TONEX-Loader-windows-amd64.exe
          - os: macos-latest
            platform: darwin/amd64
            artifact: BCho-TONEX-Loader-macos-intel.zip
          - os: macos-latest
            platform: darwin/arm64
            artifact: BCho-TONEX-Loader-macos-apple-silicon.zip
          - os: ubuntu-latest
            platform: linux/amd64
            artifact: BCho-TONEX-Loader-linux-amd64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: |
          wails build -platform ${{ matrix.platform }}
          copy build\bin\BCho-TONEX-Loader.exe build\bin\${{ matrix.artifact }}

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: |
          wails build -platform ${{ matrix.platform }} -tags webkit2_41
          cp build/bin/BCho-TONEX-Loader build/bin/${{ matrix.artifact }}

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: |
          wails build -platform ${{ matrix.platform }}
          cd build/bin
          ditto -c -k --sequesterRsrc --keepParent BCho-TONEX-Loader.app ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: build/bin/${{ matrix.artifact }}

  release:
    needs: build
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      # Usamos el CLI de gh en vez de una action de release: crea la release y
      # sube TODOS los binarios de forma atomica/fiable. (La action softprops tuvo
      # una condicion de carrera "tag not yet discoverable" que dejaba assets sin
      # adjuntar.) Si la release ya existe, hace --clobber de los ficheros.
      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$tag" --repo "$GITHUB_REPOSITORY" --notes-file .github/RELEASE_BODY.md
            gh release upload "$tag" artifacts/* --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$tag" artifacts/* --repo "$GITHUB_REPOSITORY" \
              --title "$tag" --notes-file .github/RELEASE_BODY.md
          fi
